# Tiny Tapeout project information
project:
  title:        "CORDIC sin/cos generator"      # Project title
  author:       "Jacques Te"      # Name
  discord:      "Jacquez"      # Discord username
  description:  " Computes the sine and cosine of an 8-bit input angle using an iterative 8-stage CORDIC algorithm in Q2.6 fixed-point."      #Project Decription
  language:     "Verilog"  #HDL
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable) 50Mhz

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:   "tt_um_jte_cordic"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_jte_cordic.v"
    - "cordic_top.v"
    - "cordic_fsm.v"
    - "cordic_core.v"
    - "rotation_step.v"
    - "arctan_lut.v"
    - "angle_to_init.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
   # Inputs
  ui[0]: "angle[0]"
  ui[1]: "angle[1]"
  ui[2]: "angle[2]"
  ui[3]: "angle[3]"
  ui[4]: "angle[4]"
  ui[5]: "angle[5]"
  ui[6]: "angle[6]"
  ui[7]: "start"

  # Outputs
  uo[0]: "sin[0]"
  uo[1]: "sin[1]"
  uo[2]: "sin[2]"
  uo[3]: "sin[3]"
  uo[4]: "sin[4]"
  uo[5]: "sin[5]"
  uo[6]: "sin[6]"
  uo[7]: "sin[7]"

  # Bidirectional pins
  uio[0]: "cos[0]"
  uio[1]: "cos[1]"
  uio[2]: "cos[2]"
  uio[3]: "cos[3]"
  uio[4]: "cos[4]"
  uio[5]: "cos[5]"
  uio[6]: "cos[6]"
  uio[7]: "cos[7]"
  
# Do not change!
yaml_version: 6
